services:
  ministack:
    image: ministackorg/ministack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb,s3
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  bootstrap:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - uv-cache:/root/.cache/uv
      - bootstrap-venv:/workspace/.venv
    env_file:
      - ../.env
    environment:
      # Dentro da rede do compose, "localhost" não alcança o container `ministack` — precisa do
      # nome do serviço (docs/01-dominio-e-contratos.md §8). O `.env` na raiz usa localhost:4566
      # de propósito, para ferramentas rodando no host (aws cli, pytest, uv run direto).
      - AWS_ENDPOINT_URL=http://ministack:4566
      - UV_LINK_MODE=copy
    depends_on:
      ministack:
        condition: service_healthy
    command: ["uv", "run", "--package", "infra-bootstrap", "python", "infra/bootstrap/main.py"]

  api-gateway:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace
      - uv-cache:/root/.cache/uv
      - api-gateway-venv:/workspace/.venv
    env_file:
      - ../.env
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - UV_LINK_MODE=copy
    depends_on:
      ministack:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    command:
      [
        "uv",
        "run",
        "--package",
        "api-gateway",
        "uvicorn",
        "api_gateway.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]

  order-processor:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
      - uv-cache:/root/.cache/uv
      - order-processor-venv:/workspace/.venv
    env_file:
      - ../.env
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - UV_LINK_MODE=copy
    depends_on:
      ministack:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    command: ["uv", "run", "--package", "order-processor", "python", "-m", "order_processor.main"]

  order-validator:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    ports:
      - "8081:8081"
    volumes:
      - ..:/workspace
      - uv-cache:/root/.cache/uv
      - order-validator-venv:/workspace/.venv
    env_file:
      - ../.env
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - UV_LINK_MODE=copy
    depends_on:
      ministack:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    command: ["uv", "run", "--package", "order-validator", "python", "-m", "order_validator.main"]

  pdf-generator:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    ports:
      - "8082:8082"
    volumes:
      - ..:/workspace
      - uv-cache:/root/.cache/uv
      - pdf-generator-venv:/workspace/.venv
    env_file:
      - ../.env
    environment:
      - AWS_ENDPOINT_URL=http://ministack:4566
      - UV_LINK_MODE=copy
    depends_on:
      ministack:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    command: ["uv", "run", "--package", "pdf-generator", "python", "-m", "pdf_generator.main"]

volumes:
  uv-cache:
  bootstrap-venv:
  api-gateway-venv:
  order-processor-venv:
  order-validator-venv:
  pdf-generator-venv:
